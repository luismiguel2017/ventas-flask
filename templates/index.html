<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Módulo de Ventas y Productos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- Librería SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="container">
    <h2>Módulo de Ventas y Productos</h2>

    <!-- Menú de pestañas -->
    <div class="tabs">
      <button class="tab active" onclick="mostrarSeccion('producto')">Ingresar Producto</button>
      <button class="tab" onclick="mostrarSeccion('venta')">Realizar Venta</button>
    </div>

    <!-- Sección Ingresar Producto -->
    <div id="producto" class="seccion activa">
      <h3>Agregar Nuevo Producto</h3>
      <form action="/registrar" method="POST" onsubmit="return mostrarMensaje(event)">
        <label for="nombre">Nombre del Producto:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Tamal" required>

        <label for="precio">Precio (S/):</label>
        <input type="number" id="precio" name="precio" step="0.01" placeholder="0.00" required>

        <button type="submit" class="guardar">Guardar Producto</button>
      </form>
    </div>

    <!-- Sección Realizar Venta -->
    <div id="venta" class="seccion">
      <h3>Seleccionar Productos para la Venta</h3>
      <input type="text" id="buscar" placeholder="Buscar producto...">

      <table id="tablaProductos">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio (S/)</th>
            <th>Cantidad</th>
            <th>Seleccionar</th>
          </tr>
        </thead>
        <tbody>
          <!-- Se llena dinámicamente desde Flask -->
        </tbody>
      </table>

      <button class="confirmar">Confirmar Venta</button>
    </div>
  </div>

  <!-- Script principal -->
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
