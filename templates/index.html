<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema Ventas Cafetería Walter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Tu CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- Librería SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

  <div class="container my-5 p-4 shadow rounded bg-white">
    <h2 class="text-center text-primary mb-4">Sistema Ventas Cafetería Walter</h2>

    <!-- Menú de pestañas -->
    <div class="d-flex justify-content-center mb-4">
      <button class="tab btn btn-primary me-2" onclick="mostrarSeccion('producto')">Ingresar Producto</button>
      <button class="tab btn btn-outline-primary" onclick="mostrarSeccion('venta')">Realizar Venta</button>
    </div>

    <!-- Sección Ingresar Producto -->
    <div id="producto" class="seccion activa">
      <h4 class="mb-3">Agregar Nuevo Producto</h4>
      <form action="/registrar" method="POST" onsubmit="return mostrarMensaje(event)">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre del Producto:</label>
          <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej. Tamal" required>
        </div>

        <div class="mb-3">
          <label for="precio" class="form-label">Precio (S/):</label>
          <input type="number" id="precio" name="precio" class="form-control" step="0.01" placeholder="0.00" required>
        </div>

        <button type="submit" class="btn btn-success w-100 btn-lg guardar">Guardar Producto</button>
      </form>
    </div>

    <!-- Sección Realizar Venta -->
    <div id="venta" class="seccion">
      <h4 class="mb-3">Seleccionar Productos para la Venta</h4>

      <!-- 📌 Campo de búsqueda -->
      <input type="text" id="buscar" class="form-control mb-3" placeholder="Buscar producto...">

      <div class="table-responsive">
        <table id="tablaProductos" class="table table-striped table-hover table-sm">
          <thead class="table-primary">
            <tr>
              <th>Producto</th>
              <th>Precio (S/)</th>
              <th>Cantidad</th>
              <th>Seleccionar</th>
            </tr>
          </thead>
          <tbody>
            <!-- Se llena dinámicamente desde Flask -->
          </tbody>
        </table>
      </div>

      <button class="btn btn-warning w-100 btn-lg mt-3 confirmar">Confirmar Venta</button>
    </div>
  </div>

  <!-- Script principal -->
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
