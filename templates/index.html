<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema Ventas Cafetería Walter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --bg-image: url("{{ url_for('static', filename='cafe.jpeg') }}"); }
    .seccion { display: none !important; }
    .seccion.activa { display: block !important; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar-custom">
    <div class="navbar-left">
      <!-- Menú hamburguesa -->
      <button class="hamburger-btn" id="menuToggle">
        <i class="bi bi-list"></i>
      </button>
      <div class="navbar-brand-custom">
        <i class="bi bi-cup-hot-fill"></i>
        <span>Sistema Ventas Cafetería Walter</span>
      </div>
    </div>
    <div class="navbar-user dropdown">
      <button class="user-btn dropdown-toggle" data-bs-toggle="dropdown">
        <i class="bi bi-person-circle"></i>
        Hola, {{ usuario }}
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li>
          <a class="dropdown-item text-danger" href="/logout">
            <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- MENÚ LATERAL -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="bi bi-cup-hot-fill"></i>
      <span>Menú</span>
      <button class="sidebar-close" id="sidebarClose">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <ul class="sidebar-menu">
      <li>
        <a href="#" onclick="mostrarSeccion('inicio', null); cerrarMenu()">
          <i class="bi bi-house-fill"></i> Inicio
        </a>
      </li>
      <li>
        <a href="#" onclick="mostrarSeccion('venta', null); cerrarMenu()">
          <i class="bi bi-cart3"></i> Realizar Venta
        </a>
      </li>
      <li>
        <a href="#" onclick="mostrarSeccion('producto', null); cerrarMenu()">
          <i class="bi bi-plus-circle"></i> Ingresar Producto
        </a>
      </li>
    </ul>
  </div>

  <!-- OVERLAY MENÚ -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="cerrarMenu()"></div>

  <!-- CONTENIDO -->
  <div class="dashboard-container">

    <!-- Sección Inicio -->
    <div id="inicio" class="seccion activa">
      <div class="welcome-wrap">
        <i class="bi bi-cup-hot-fill welcome-icon"></i>
        <h2 class="welcome-title">Bienvenido al Sistema de Ventas</h2>
        <p class="welcome-sub">Cafetería Walter</p>
        <div class="welcome-cards">
          <div class="welcome-card" onclick="mostrarSeccion('venta', null)">
            <i class="bi bi-cart3"></i>
            <span>Realizar Venta</span>
          </div>
          <div class="welcome-card" onclick="mostrarSeccion('producto', null)">
            <i class="bi bi-plus-circle"></i>
            <span>Ingresar Producto</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Sección Realizar Venta -->
    <div id="venta" class="seccion">
      <h4 class="section-title">Seleccionar Productos para la Venta</h4>

      <div class="search-wrap mb-3">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="buscar" class="search-input" placeholder="Buscar producto...">
      </div>

      <div class="table-responsive">
        <table id="tablaProductos" class="table-custom">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio (S/)</th>
              <th>Cantidad</th>
              <th>Seleccionar</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <button class="btn-confirm mt-4" onclick="confirmarVenta()">
        <i class="bi bi-check-circle me-2"></i>Confirmar Venta
      </button>
    </div>

    <!-- Sección Ingresar Producto -->
    <div id="producto" class="seccion">
      <h4 class="section-title">Agregar Nuevo Producto</h4>
      <form action="/registrar" method="POST" onsubmit="return mostrarMensaje(event)">
        <div class="mb-3">
          <label class="form-label-custom">Nombre del Producto</label>
          <input type="text" name="nombre" class="input-custom" placeholder="Ej. Tamal" required>
        </div>
        <div class="mb-3">
          <label class="form-label-custom">Precio (S/)</label>
          <input type="number" name="precio" class="input-custom" step="0.01" placeholder="0.00" required>
        </div>
        <button type="submit" class="btn-confirm">
          <i class="bi bi-save me-2"></i>Guardar Producto
        </button>
      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    function mostrarSeccion(id, btn) {
      document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
      document.getElementById(id).classList.add('activa');
      if (id === 'venta') cargarProductos();
    }

    function cerrarMenu() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    });

    document.getElementById('sidebarClose').addEventListener('click', cerrarMenu);
  </script>

</body>
</html>
