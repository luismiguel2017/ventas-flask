<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Ventas – Cafetería Walter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"/>

  <style>
    :root {
      --bg-image: url("{{ url_for('static', filename='cafe.jpeg') }}");
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="login-card">

    <div class="logo-wrap">
      <i class="bi bi-cup-hot-fill"></i>
    </div>

    <h1 class="login-title">Sistema Ventas<br>Cafetería Walter</h1>
    <p class="login-sub">Inicia sesión para continuar</p>

    <div class="ornament">
      <span></span>
      <i class="bi bi-diamond-fill"></i>
      <span></span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert-login show">
            <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="alert-login" id="alertLogin"></div>

    <form method="POST" action="/login" id="loginForm">

      <div class="input-group-custom">
        <i class="bi bi-person icon-left"></i>
        <input type="text" name="usuario" id="usuario" placeholder="Usuario" autocomplete="username" required/>
      </div>

      <div class="input-group-custom">
        <i class="bi bi-lock icon-left"></i>
        <input type="password" name="contrasena" id="contrasena" placeholder="Contraseña" autocomplete="current-password" required/>
        <i class="bi bi-eye-slash icon-right" id="togglePass" title="Mostrar contraseña"></i>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="recordarme" name="recordarme"/>
        <label for="recordarme">Recordarme</label>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span class="label">Iniciar Sesión</span>
        <span class="spinner">
          <span class="spinner-border spinner-border-sm" role="status"></span>
          &nbsp;Verificando…
        </span>
      </button>

    </form>

    <p class="card-footer-text">
      ¿Problemas para acceder? <a href="#">Contacta al administrador</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const btn       = document.getElementById('btnLogin');
  const passInput = document.getElementById('contrasena');
  const toggle    = document.getElementById('togglePass');
  const alertEl   = document.getElementById('alertLogin');

  toggle.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    toggle.className = isPass ? 'bi bi-eye icon-right' : 'bi bi-eye-slash icon-right';
  });

  btn.addEventListener('click', () => {
    btn.classList.add('loading');
  });

  const saved = localStorage.getItem('wc_usuario');
  if (saved) {
    document.getElementById('usuario').value = saved;
    document.getElementById('recordarme').checked = true;
  }

  document.getElementById('loginForm').addEventListener('submit', () => {
    if (document.getElementById('recordarme').checked && document.getElementById('usuario').value.trim())
      localStorage.setItem('wc_usuario', document.getElementById('usuario').value.trim());
    else
      localStorage.removeItem('wc_usuario');
  });
</script>
</body>
</html>
