<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Ventas Cafetería Walter - Login</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Tu CSS personalizado para login -->
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
  <style>
    .login-body {
        background: url("{{ url_for('static', filename='cafe.jpeg') }}") no-repeat center center fixed !important;
        background-size: cover !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        box-sizing: border-box;
    }
</style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo">☕</div>
        <h2>Sistema Ventas<br>Cafetería Walter</h2>
        <p class="subtitle">Inicia sesión para continuar</p>
        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" required>
            </div>
            <div class="mb-3">
                <label for="contrasena" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="contrasena" name="contrasena" required>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="recordar">
                <label class="form-check-label" for="recordar">Recuérdame</label>
            </div>
            <button type="submit" class="btn btn-coffee w-100">Iniciar Sesión</button>
        </form>
    </div>
</body>
</html>
